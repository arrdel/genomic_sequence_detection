# =============================================================================
# Default Configuration — Contrastive VQ-VAE for Genomic Surveillance
# =============================================================================

# Data Configuration
data:
  raw_dir: "/media/scratch/adele/contrastive/raw"
  processed_dir: "/media/scratch/adele/contrastive/processed"
  data_path: "/media/scratch/adele/contrastive/processed/cleaned_reads.fastq"
  reference_genome: "/media/scratch/adele/contrastive/external/NC_045512.2.fasta"
  max_seq_length: 150
  k_mer: 6
  use_canonical: false
  test_split: 0.1

# Model Configuration
model:
  vocab_size: 4099  # 4^6 + 3 special tokens (PAD, UNK, MASK)
  num_codes: 512
  code_dim: 64
  embed_dim: 128
  hidden_dim: 256
  commitment_cost: 0.1
  ema_decay: 0.95
  entropy_weight: 0.003
  dropout: 0.1

# Training Configuration
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0002
  weight_decay: 0.0001
  optimizer: "adamw"
  grad_clip: 1.0
  num_workers: 4
  save_freq: 5
  log_freq: 100

# Masked Pretraining
masked:
  mask_prob: 0.2
  epochs: 50

# Contrastive Fine-tuning
contrastive:
  epochs: 10
  batch_size: 64
  learning_rate: 0.0001
  temperature: 0.5
  mask_prob: 0.15
  drop_prob: 0.10
  proj_dims: [64, 128]

# GPU Configuration
gpu:
  n_gpu: 2
  gpu_ids: "0,1"

# Experiment Configuration
experiment:
  output_dir: "/media/scratch/adele/contrastive/experiments"
  checkpoint_dir: "/media/scratch/adele/contrastive/checkpoints"
  seeds: [42, 123, 456, 789, 1024]

# Evaluation Configuration
evaluation:
  n_clusters: [5, 10, 15, 20]
  num_eval_samples: 10000
  retrieval_k: [1, 5, 10, 20]

# Logging
logging:
  wandb_project: "contrastive-vqvae-genomics"
  wandb_entity: null
